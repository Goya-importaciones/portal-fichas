<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goya Fichas</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F2EE;
  --s:#FFFFFF;
  --b:#E3DED7;
  --bm:#C9C3BB;
  --t:#18160F;
  --mu:#7A756E;
  --hi:#B2ADA6;
  --a:#3D3A35;
  --a2:#5A554E;
  --tag:#ECEAE5;
  --tagc:#6B665F;
  --green:#2F6B3A;
  --gbg:#EBF2EC;
  --r:6px;--rl:12px;
}
body{font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--t);font-size:14px;min-height:100vh}

/* HEADER */
.hd{background:var(--t);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.06)}
.logo{font-family:Segoe UI,Arial,sans-serif;font-weight:700;font-size:17px;color:#fff;letter-spacing:-.2px}
.logo span{color:rgba(255,255,255,.38);font-weight:500;margin-left:2px}
.hd-r{display:flex;align-items:center;gap:8px}
.btn-s{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.85);padding:5px 12px;border-radius:var(--r);font-family:inherit;font-size:13px;cursor:pointer;transition:background .15s,border-color .15s,color .15s}
.btn-s:hover{background:rgba(255,255,255,.12)}
.badge{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:10px;padding:0 6px;font-size:11px;font-weight:600;min-width:20px;text-align:center;line-height:18px}
.badge.has{background:#fff;color:var(--t)}
.btn-g{background:#fff;border:none;color:var(--t);padding:5px 14px;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s,border-color .15s,color .15s}
.btn-g:hover{background:#f0ede8}
.btn-g:disabled{background:rgba(255,255,255,.2);color:rgba(255,255,255,.4);cursor:not-allowed}
.btn-desel{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.7);width:30px;height:30px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s,color .15s;flex-shrink:0}
.btn-desel:hover{background:rgba(255,255,255,.16);color:#fff}
.btn-desel:disabled{opacity:.25;cursor:not-allowed}

/* LAYOUT */
.layout{min-height:calc(100vh - 52px)}

/* SEARCH EN HEADER */
.search-w{position:relative}
.search-w input{width:240px;padding:6px 10px 6px 30px;border:1px solid rgba(255,255,255,.18);border-radius:var(--r);font-family:inherit;font-size:13px;background:rgba(255,255,255,.08);color:#fff;outline:none;transition:background .15s,border-color .15s,color .15s}
.search-w input::placeholder{color:rgba(255,255,255,.35)}
.search-w input:focus{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.35);width:300px}
.search-w svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);pointer-events:none}

/* MAIN */
.main{padding:1.25rem}
.tbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.tbar-txt{font-size:13px;color:var(--mu)}
.tbar-txt strong{color:var(--t);font-weight:500}
.sort{border:1px solid var(--b);border-radius:var(--r);padding:5px 9px;font-family:inherit;font-size:13px;background:var(--s);color:var(--t);cursor:pointer;outline:none}
.chips{display:flex;gap:6px;align-items:center}
.chip{padding:4px 11px;border:1.5px solid var(--b);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:background .15s,border-color .15s,color .15s;background:var(--s);color:var(--mu);user-select:none}
.chip:hover{border-color:var(--bm);color:var(--t)}
.chip.new.on{background:#EBF3EC;border-color:#2F6B3A;color:#2F6B3A}
.chip.outlet.on{background:#FFF3E0;border-color:#C07020;color:#C07020}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px}
.card{background:var(--s);border:1.5px solid var(--b);border-radius:var(--rl);overflow:hidden;cursor:pointer;position:relative;user-select:none;transition:border-color .1s,box-shadow .1s;will-change:transform}
.card:hover{border-color:var(--bm);box-shadow:0 3px 14px rgba(0,0,0,.07)}
.card.sel{border-color:var(--t);box-shadow:0 0 0 1.5px var(--t)}
.chkc{position:absolute;top:7px;right:7px;width:21px;height:21px;border-radius:50%;background:rgba(255,255,255,.9);border:1.5px solid var(--bm);display:flex;align-items:center;justify-content:center;z-index:2;transition:background .1s,border-color .1s}
.card.sel .chkc{background:var(--t);border-color:var(--t)}
.card.sel .chkc::after{content:'';width:9px;height:5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.ci{width:100%;aspect-ratio:4/3;background:var(--bg);overflow:hidden;position:relative}
.ci img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s,opacity .3s;opacity:0}
.ci img.loaded{opacity:1}
.card:hover .ci img{transform:scale(1.03)}
.ni{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--hi)}
.skel{position:absolute;inset:0;background:linear-gradient(90deg,var(--bg) 25%,#e8e4de 50%,var(--bg) 75%);background-size:200% 100%;animation:skel 1.4s ease-in-out infinite}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
.cb{padding:9px 10px 11px}
.cref{font-size:10px;color:var(--hi);letter-spacing:.06em;margin-bottom:2px}
.cname{font-family:Segoe UI,Arial,sans-serif;font-weight:500;font-size:13px;line-height:1.3;margin-bottom:7px;color:var(--t)}
.dots{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.1);flex-shrink:0}
.dot-m{font-size:10px;color:var(--hi)}
.ctags{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.ctag{font-size:10px;padding:2px 6px;border-radius:20px;background:var(--tag);color:var(--tagc)}
.ctag.g{background:var(--gbg);color:var(--green)}

.empty{grid-column:1/-1;text-align:center;padding:4rem;color:var(--mu)}
.empty strong{display:block;font-size:15px;margin-bottom:6px;color:var(--t);font-weight:500}
.sw{grid-column:1/-1;display:flex;justify-content:center;align-items:center;min-height:280px;flex-direction:column;gap:10px;color:var(--mu)}
.spin{width:26px;height:26px;border:2px solid var(--b);border-top-color:var(--t);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.pag{display:flex;justify-content:center;gap:5px;margin-top:1.5rem;flex-wrap:wrap}
.pbt{padding:5px 9px;border:1px solid var(--b);border-radius:var(--r);background:var(--s);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;color:var(--mu);transition:all .12s;min-width:32px;text-align:center}
.pbt:hover{border-color:var(--t);color:var(--t)}
.pbt.act{background:var(--t);border-color:var(--t);color:#fff}
.pbt:disabled{opacity:.35;cursor:not-allowed}

/* ─── MODAL ─── */
.ov{display:none;position:fixed;inset:0;background:rgba(10,9,7,.5);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1.5rem;overflow-y:auto}
.ov.open{display:flex}
.modal{background:var(--s);border-radius:var(--rl);width:100%;max-width:920px;margin:auto;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.mhd{padding:1.1rem 1.5rem;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.mhd h2{font-family:Segoe UI,Arial,sans-serif;font-weight:700;font-size:16px}
.mcl{background:none;border:none;cursor:pointer;color:var(--mu);font-size:20px;line-height:1;padding:3px 7px;border-radius:4px}
.mcl:hover{background:var(--bg);color:var(--t)}
.mbody{padding:1.25rem;overflow-y:auto}

/* OPCIONES */
.optsbox{background:var(--bg);border-radius:var(--r);padding:.9rem 1rem;margin-bottom:1.25rem}
.optslbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--hi);margin-bottom:9px}
.opts{display:flex;gap:7px;flex-wrap:wrap}
.opt{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--b);border-radius:var(--r);background:var(--s);cursor:pointer;font-size:13px;transition:background .15s,border-color .15s,color .15s;user-select:none}
.opt:hover{border-color:var(--t)}
.opt input{accent-color:var(--t)}
.opt.on{border-color:var(--t);background:var(--t);color:#fff}
.opt.on input{accent-color:#fff}
.opt.dis{opacity:.4;cursor:not-allowed}

/* ITEM SELECCIONADO */
.slist{display:flex;flex-direction:column;gap:16px}
.si{border:1px solid var(--b);border-radius:var(--rl);overflow:hidden}
.si-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--b);background:var(--bg)}
.si-id{display:flex;align-items:baseline;gap:8px}
.si-ref{font-size:10px;color:var(--hi);letter-spacing:.07em}
.si-name{font-family:Segoe UI,Arial,sans-serif;font-weight:700;font-size:14px;color:var(--t)}
.si-rm{background:none;border:none;color:var(--hi);cursor:pointer;font-size:12px;padding:0}
.si-rm:hover{color:var(--t)}
.si-body{padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.si-col{}
.si-sec{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--hi);margin-bottom:8px}
.dato{font-size:12px;display:flex;gap:8px;margin-bottom:4px}
.dato-l{color:var(--mu);min-width:70px;flex-shrink:0}
.dato-v{color:var(--t);font-weight:500}
.si-desc{font-size:12px;color:var(--mu);line-height:1.55;margin-bottom:10px}
.mchips{display:flex;gap:6px;flex-wrap:wrap}
.mchip{display:inline-flex;align-items:center;padding:5px 9px;border:1px solid var(--b);border-radius:20px;background:var(--tag);color:var(--tagc);font-size:11px;font-weight:500;line-height:1.2}
.vars{display:flex;gap:4px;flex-wrap:wrap}
.vchip{display:flex;align-items:center;gap:4px;padding:3px 7px;border:1px solid var(--b);border-radius:20px;font-size:11px;color:var(--mu)}

/* SELECTOR DE IMÁGENES */
.imgsel{margin-top:10px}
.imgsel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-top:6px}
.imgthumb{position:relative;cursor:pointer;border-radius:var(--r);overflow:hidden;aspect-ratio:1;border:2px solid transparent;transition:background .15s,border-color .15s,color .15s}
.imgthumb:hover{border-color:var(--bm)}
.imgthumb.on{border-color:var(--t)}
.imgthumb.dis{cursor:not-allowed;filter:grayscale(.35);opacity:.42}
.imgthumb.dis:hover{border-color:transparent}
.imgthumb img{width:100%;height:100%;object-fit:cover;display:block}
.imgthumb-ck{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:var(--t);display:none;align-items:center;justify-content:center}
.imgthumb.on .imgthumb-ck{display:flex}
.imgthumb-ck::after{content:'';width:7px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(12px);background:var(--t);color:#fff;border-radius:var(--r);padding:9px 13px;font-size:13px;box-shadow:0 10px 26px rgba(0,0,0,.22);z-index:400;opacity:0;pointer-events:none;transition:opacity .18s,transform .18s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.mft{padding:1rem 1.5rem;border-top:1px solid var(--b);display:flex;gap:8px;justify-content:flex-end;background:var(--s)}
.btn-c{background:none;border:1px solid var(--b);border-radius:var(--r);padding:7px 14px;font-family:inherit;font-size:13px;cursor:pointer;color:var(--mu)}
.btn-c:hover{border-color:var(--bm);color:var(--t)}
.btn-pdf{background:var(--t);border:none;border-radius:var(--r);padding:7px 18px;font-family:inherit;font-size:13px;font-weight:500;color:#fff;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-pdf:hover{background:var(--a2)}
.btn-pdf:disabled{background:var(--bm);cursor:not-allowed}
</style>
</head>
<body>

<header class="hd">
  <div class="logo">Goya <span>Fichas</span></div>
  <div class="search-w">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="q" placeholder="Buscar referencia o nombre…" id="qinput">
  </div>
  <div class="hd-r">
    <button class="btn-s" onclick="abrirModal()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg>
      Selección <span class="badge" id="badge">0</span>
    </button>
    <button class="btn-desel" id="btnDesel" onclick="deselAll()" disabled title="Deseleccionar todo">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <button class="btn-g" id="btnG" onclick="abrirModal()" disabled>Generar fichas</button>
  </div>
</header>

<div class="layout">
  <main class="main">
    <div class="tbar">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="tbar-txt" id="tInfo">Cargando…</div>
        <div class="chips">
          <div class="chip new" id="chipNew" onclick="togChip('new')">✦ Novedades</div>
          <div class="chip outlet" id="chipOutlet" onclick="togChip('outlet')">Outlet</div>
        </div>
      </div>
      <select class="sort" onchange="ordenar(this.value)">
        <option value="nuevo" selected>Más recientes primero</option>
        <option value="ref">Por referencia</option>
        <option value="nombre">Por nombre A–Z</option>
      </select>
    </div>
    <div class="grid" id="grid">
      <div class="sw"><div class="spin"></div><span>Cargando catálogo…</span></div>
    </div>
    <div class="pag" id="pag"></div>
  </main>
</div>

<!-- MODAL -->
<div class="ov" id="ov" onclick="ovClick(event)">
  <div class="modal">
    <div class="mhd">
      <h2>Configurar fichas</h2>
      <button class="mcl" onclick="cerrar()">×</button>
    </div>
    <div class="mbody">
      <div class="optsbox">
        <div class="optslbl">Incluir en cada ficha</div>
        <div class="opts">
          <label class="opt on" id="oM"><input type="checkbox" checked onchange="togO(this,'oM')"> Técnicas de marcaje</label>
          <label class="opt on" id="oV"><input type="checkbox" checked onchange="togO(this,'oV')"> Variantes de color</label>
          <label class="opt dis" title="Sin datos aún"><input type="checkbox" disabled> Certificados</label>
        </div>
      </div>
      <div class="slist" id="slist"></div>
    </div>
    <div class="mft">
      <button class="btn-c" onclick="cerrar()">Cancelar</button>
      <button class="btn-pdf" id="btnPDF" onclick="generarPDF()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3"/><path d="M20 17v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/></svg>
        Previsualizar PDF
      </button>
    </div>
  </div>
</div>

<script>
let PRODS=[],PROD_BY_REF=new Map(),filt=[],sel=new Set(),pg=1,ord='nuevo';
const PPG=24;
const MAX_MODAL_IMGS=12;
const MAX_PDF_IMGS=6;
const imgSel={};
let activeChip=null;
let DETALLE=null; // se carga lazy al primer modal
let detallePromise=null;
let toastTimer=null;

// Intersection Observer para lazy load — se crea una sola vez
let observer=null;
function initLazyLoad(){
  if(!observer){
    observer=new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(!e.isIntersecting)return;
        const img=e.target.querySelector('img[data-src]');
        if(img){img.src=img.dataset.src;delete img.dataset.src;observer.unobserve(e.target);}
      });
    },{rootMargin:'300px 0px'});
  }
  document.querySelectorAll('.ci').forEach(c=>observer.observe(c));
}

function debounce(fn, ms){
  let t;
  return (...args)=>{clearTimeout(t);t=setTimeout(()=>fn(...args),ms);};
}

async function init(){
  try{
    // Cargar ambos en paralelo — el grid se muestra cuando llega primero
    const rGrid = await fetch('productos-grid.json');
    PRODS = (await rGrid.json()).map(p=>({
      ...p,
      _q:`${p.ref} ${p.nombre||''}`.toLowerCase(),
      _score:refScore(p.ref)
    }));
    PROD_BY_REF = new Map(PRODS.map(p=>[p.ref,p]));
    document.getElementById('q').addEventListener('input', debounce(filtrar, 220));
    filtrar();
  }catch(e){
    document.getElementById('grid').innerHTML='<div class="empty"><strong>Error al cargar los datos</strong><span>Asegúrate de que los archivos JSON están en la misma carpeta</span></div>';
  }
}

async function cargarDetalles(){
  // El detalle se carga bajo demanda para que el grid inicial sea ligero.
  return Promise.resolve();
}

async function asegurarDetalles(){
  if(DETALLE)return DETALLE;
  if(!detallePromise){
    detallePromise=fetch('productos-detalle.json')
      .then(r=>{
        if(!r.ok)throw new Error('No se pudo cargar productos-detalle.json');
        return r.json();
      })
      .then(json=>{DETALLE=json;return DETALLE;})
      .catch(err=>{detallePromise=null;throw err;});
  }
  return detallePromise;
}

function togChip(tipo){
  if(activeChip===tipo){
    activeChip=null;
    document.getElementById('chipNew').classList.remove('on');
    document.getElementById('chipOutlet').classList.remove('on');
  } else {
    activeChip=tipo;
    document.getElementById('chipNew').classList.toggle('on', tipo==='new');
    document.getElementById('chipOutlet').classList.toggle('on', tipo==='outlet');
  }
  pg=1;filtrar();
}

function filtrar(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  filt=PRODS.filter(p=>{
    if(q&&!p._q.includes(q))return false;
    if(activeChip==='new'&&!p.es_new)return false;
    if(activeChip==='outlet'&&!p.es_outlet)return false;
    return true;
  });
  ordenar(ord,false);pg=1;render();
}

function refScore(ref){
  // Solo refs puramente numéricas de 5 dígitos son "catálogo normal"
  // Alfanuméricos (Germina, EXPRESS...) y 80xxx/98xxx → al final
  if(!/^\d{5}$/.test(ref)) return -1; // no es exactamente 5 dígitos numéricos → al final
  const n = parseInt(ref);
  const p = Math.floor(n/10000);
  if(p===8||p===9) return n - 1000000; // 8xxxx/9xxxx → penúltimos
  return n; // 5 dígitos normales: mayor = más nuevo
}

function ordenar(v,re=true){
  ord=v;
  if(v==='nuevo') filt.sort((a,b)=>b._score-a._score);
  else if(v==='ref') filt.sort((a,b)=>a.ref.localeCompare(b.ref,undefined,{numeric:true}));
  else filt.sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  if(re)render();
}

function render(){
  const tot=filt.length;
  const page=filt.slice((pg-1)*PPG,pg*PPG);
  document.getElementById('tInfo').innerHTML=`<strong>${tot}</strong> producto${tot!==1?'s':''} encontrado${tot!==1?'s':''}`;
  const g=document.getElementById('grid');
  if(!page.length){g.innerHTML='<div class="empty"><strong>Sin resultados</strong>Prueba con otro término</div>';document.getElementById('pag').innerHTML='';return;}
  // Usar requestAnimationFrame para no bloquear el hilo de UI
  requestAnimationFrame(()=>{
    g.innerHTML=page.map(card).join('');
    renderPag(tot);
    initLazyLoad();
  });
}

function card(p){
  const s=sel.has(p.ref);
  const imgUrl=p.img||p.imagenes?.[0]||'';
  const imgHtml=imgUrl
    ?`<div class="skel"></div><img data-src="${imgUrl}" alt="" onload="this.classList.add('loaded');this.previousSibling?.remove()" onerror="this.parentElement.innerHTML='<div class=ni>sin imagen</div>'">`
    :`<div class="ni">sin imagen</div>`;
  const dots=p.variantes?.slice(0,8).map(v=>`<div class="dot" style="background:${v.color_hex||'#ccc'}" title="${v.descripcion||v.codigo}"></div>`).join('')||'';
  const more=p.variantes?.length>8?`<span class="dot-m">+${p.variantes.length-8}</span>`:'';
  const tags=[];
  if(p.es_new)tags.push(`<span class="ctag" style="background:#EBF3EC;color:#2F6B3A;font-weight:600">NEW</span>`);
  if(p.es_outlet)tags.push(`<span class="ctag" style="background:#FFF3E0;color:#C07020;font-weight:600">OUTLET</span>`);

}

    else if(Math.abs(i-pg)===3)h+=`<span style="color:var(--hi);padding:0 3px">…</span>`;

  h+=`<button class="pbt" onclick="goPg(${pg+1})" ${pg===pages?'disabled':''}>→</button>`;

}

function normTxt(s){
  return (s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();
}

function canonZona(z){

  if(!t)return '';

    'CAJA':'BOX',

    'VARILLA TRASERA':'BACK',
    'FRONTAL':'FRONT MARKING',
    'TRASERA':'BACK MARKING',
    'TIRA':'STRAP',
    'DERECHA':'RIGHT',

    'SUPERIOR':'TOP',

    'VERTICAL':'VERTICAL',

  };

}

function extraerVarianteMarcaje(m){
  const t=normTxt(m.tecnica).toUpperCase();
  const c=normTxt(m.codigo).toUpperCase();
  let base=t, variant='';
  let match=t.match(/^(.*?FULL PRINT MEASURE DTF)\s*(\d+)$/i);
  if(match){base=match[1];variant=match[2];}
  else if(match=t.match(/^(.*?)(?:\s*-\s*)?(\d+)\s*COLOU?RS?$/i)){base=match[1];variant=match[2];}
  else if(match=t.match(/^(.*?)(?:\s*-\s*)?(\d+)\s*COLOR(?:ES)?$/i)){base=match[1];variant=match[2];}
  else if(match=t.match(/^(.*?)(?:\s+)([A-Z]{1,3})(\d+)$/i)){
    if(/PRINTING|LASER|SCREEN|SERIGRAFIA|TAMPON|PAD|DIGITAL|DTF/i.test(t)){base=match[1];variant=match[3];}
  }
  else if(match=t.match(/^(.*?)(?:\s+)(\d+)$/i)){
    if(/PRINTING|LASER|SCREEN|SERIGRAFIA|TAMPON|PAD|DIGITAL|DTF/i.test(t)){base=match[1];variant=match[2];}
  }
  if(!variant){
    match=c.match(/^([A-Z]+)(\d+)$/i);
    if(match && /PRINTING|LASER|SCREEN|SERIGRAFIA|TAMPON|PAD|DIGITAL|DTF/i.test(t)) variant=match[2];
  }
  base=base.replace(/\bVINYL GLITTER\b/i,'VINYL GLITTER').replace(/\bP(?:RINT)?\s*(\d+)$/i,'').replace(/\bP\d+$/i,'').replace(/\s+/g,' ').trim();
  return {base, variant};
}

function getMarcajesVista(arr){
  const marks=Array.isArray(arr)?arr:[];
  const groups=[];
  const map=new Map();
  marks.forEach((m,idx)=>{
    const {base,variant}=extraerVarianteMarcaje(m);
    const simpleBase=simplificarTecnicaMarcaje(base);
    if(!simpleBase)return;
    const key=simpleBase.toUpperCase();
    let g=map.get(key);
    if(!g){
      g={label:simpleBase,items:[],variants:[],codes:new Set(),first:idx};
      map.set(key,g);
      groups.push(g);
    }
    g.items.push(m);
    if(variant)g.variants.push(variant);
    if(m.codigo)g.codes.add(normTxt(m.codigo).toUpperCase());
  });

  return groups.map(g=>{
    const uniqVariants=[...new Set(g.variants.map(v=>String(v).trim()).filter(Boolean))];
    const nums=uniqVariants.map(v=>parseFloat(String(v).replace(',','.'))).filter(Number.isFinite).sort((a,b)=>a-b);
    let label=g.label||'';
    if(g.items.length>1 && nums.length){
      const min=nums[0], max=nums[nums.length-1];
      const range=min===max?`${min}`:`${min}-${max}`;
      if(/serigrafia|tampografia|transfer/i.test(label)) label=`${label} ${range} color${min===max&&min===1?'':'es'}`.trim();
    }
    const codeList=[...g.codes];
    let codigo='';
    if(codeList.length===1){
      codigo=codeList[0];
    }else if(codeList.length>1){
      const parts=codeList.map(c=>{const m=String(c).match(/^([A-Z]+)(\d+)$/i);return m?{p:m[1],n:parseInt(m[2],10),raw:String(c)}:{raw:String(c)};});
      if(parts.every(x=>x.n!==undefined)){
        const prefixes=[...new Set(parts.map(x=>x.p.toUpperCase()))];
        if(prefixes.length===1){
          const nums=[...new Set(parts.map(x=>x.n))].sort((a,b)=>a-b);
          const min=nums[0],max=nums[nums.length-1];
          codigo=min===max?`${prefixes[0]}${min}`:`${prefixes[0]}${min}-${max}`;
        }else{
          codigo=codeList.join(' / ');
        }
      }else{
        codigo=codeList.join(' / ');
      }
    }
    return {tecnica:label,codigo,_count:g.items.length};
  });
}

function fmtTecnicaMarcaje(m){
  return simplificarTecnicaMarcaje(m.tecnica||'');
}

function titleCaseMarcaje(s){
  const lower=normTxt(s).toLowerCase();
  return lower.replace(/\b\w/g,c=>c.toUpperCase());
}

function simplificarTecnicaMarcaje(tecnica){
  let t=normTxt(tecnica).toUpperCase();
  if(!t)return '';

  const colorMatch=t.match(/(\d+)\s*(?:COLOU?RS?|COLORES?|COLOR)\b/);
  const colours=colorMatch?` ${colorMatch[1]} color${colorMatch[1]==='1'?'':'es'}`:'';
  const sideMatch=t.match(/(\d+)\s*(?:SIDE|SIDES|CARA|CARAS|FACE|FACES)\b/);
  const sides=sideMatch?` ${sideMatch[1]} cara${sideMatch[1]==='1'?'':'s'}`:'';
  const refMatch=t.match(/\bREF\.?\s*([A-Z0-9]+)\b/);
  const ref=refMatch?` ref. ${refMatch[1]}`:'';

  if(/ETIQUETA|LABEL/.test(t)){
    if(/ADHESIVE|ADHESIVA/.test(t))return `Etiqueta adhesiva${ref}`;
    if(/BAG|BOLSA/.test(t))return `Etiqueta para bolsa${ref}`;
    if(/BLANKET|MANTA/.test(t))return `Etiqueta para manta${ref}`;
    if(/TOILETRY|NECESER/.test(t))return `Etiqueta para neceser${ref}`;
    if(/PAREO/.test(t))return `Etiqueta para pareo${ref}`;
    if(/ROUND|REDONDA/.test(t))return `Etiqueta redonda${ref}`;
    if(/SQUARE|CUADRADA/.test(t))return `Etiqueta cuadrada${ref}`;
    return `Etiqueta personalizada${ref}`;
  }
  if(/RIBBON|CINTA|TAPE/.test(t)){
    if(/SUBLIMATION|SUBLIMACION/.test(t))return `Cinta sublimada${ref}`;
    if(/POLYESTER|POLIESTER/.test(t))return `Cinta de poliester${colours}${ref}`;
    if(/NON WOVEN/.test(t))return `Cinta non woven${colours}${ref}`;
    if(/COTTON|ALGODON/.test(t))return `Cinta de algodon${ref}`;
    return `Cinta personalizada${colours}${ref}`;
  }
  if(/VINYL GLITTER|VINILO PURPURINA/.test(t))return `Vinilo purpurina${ref}`;
  if(/SILKSCREEN TRANSFER|TRANSFER SERIGRAFICO/.test(t))return `Transfer serigrafico${colours}${ref}`;
  if(/SCREENPRINT ON SILICONE|SERIGRAFIA SOBRE SILICONA/.test(t))return `Serigrafia sobre silicona${ref}`;
  if(/CIRCULAR SCREEN PRINTING|SERIGRAFIA CIRCULAR/.test(t))return `Serigrafia circular${ref}`;
  if(/SCREEN PRINTING|SILK-SCREEN|SERIGRAFIA/.test(t))return `Serigrafia${colours}${/DOBLE|DOUBLE/.test(t)?' doble pasada':''}${ref}`;
  if(/TAMPON PRINTING|PAD PRINTING|TAMPOGRAFIA|TAMPO/.test(t))return `Tampografia${colours}${ref}`;
  if(/WOOD LASER|LASER MADERA/.test(t))return `Laser madera${ref}`;
  if(/CRYSTAL LASER|LASER CRISTAL/.test(t))return `Laser cristal${ref}`;
  if(/LASER/.test(t))return `Laser${ref}`;
  if(/FULL PRINT.*DTF|DTF/.test(t))return `DTF${ref}`;
  if(/DIRECT TEXTILE|TEXTIL DTG/.test(t))return `Impresion directa textil${ref}`;
  if(/DIGITAL PRINTING|DIGITAL MARKING|IMPRESION DIGITAL|MARCAJE DIGITAL/.test(t))return `Impresion digital${ref}`;
  if(/SUBLIMATION|SUBLIMACION/.test(t))return `Sublimacion${sides}${ref}`;
  if(/EMBROIDERY|BORDADO/.test(t))return `Bordado${ref}`;
  if(/THERMO PRINTING|COLOR PRINTING THERMOS/.test(t))return `Impresion termo${ref}`;
  if(/ORIGIN MARKING|MARCAJE ORIGEN/.test(t))return `Marcaje en origen${ref}`;
  if(/SINGLE BAGGED|EMBOLSADO INDIVIDUAL/.test(t))return `Embolsado individual${ref}`;
  if(/TINT|PLANCHADO/.test(t))return `Planchado tintado${ref}`;

  return titleCaseMarcaje(t).replace(/\bDtf\b/g,'DTF').replace(/\bDg\b/g,'DG');
}

function simplificarZonaMarcaje(zona){
  const z=normTxt(zona).toUpperCase();
  if(!z)return '';
  const map={
    'BOX':'caja',
    'STICK':'varilla',
    'FRONT STICK':'varilla frontal',
    'LASER STICK':'varilla laser',
    'FRONT':'frontal',
    'FRONT MARKING':'frontal',
    'MARCAJE FRONTAL - FRONT MARKING':'frontal',
    'BACK':'trasera',
    'BACK MARKING':'trasera',
    'RIGHT':'derecha',
    'LEFT':'izquierda',
    'TOP':'superior',
    'BOTTOM':'inferior',
    'STRAP':'tira',
    'BOTH':'ambos lados',
    'LABEL':'etiqueta',
    'LID':'tapa',
    'EVERY SIDE':'todos los lados',
    'CIRCULAR SCREEN PRINTING':'circular'
  };
  return map[z]||titleCaseMarcaje(z);
}

function renderSI(p,inclM,inclV){
  const imgs=p.imagenes||[];
  const dims=[];
  if(p.dimensiones){const d=p.dimensiones;const pts=[d.ancho,d.largo,d.alto].filter(Boolean);if(pts.length)dims.push(['Medidas',pts.join(' × ')+' cm']);if(d.diametro)dims.push(['Diámetro',d.diametro+' cm']);}
  if(p.material)dims.push(['Material',p.material]);
  if(p.gramaje)dims.push(['Gramaje',p.gramaje]);
  if(p.peso_gr)dims.push(['Peso',p.peso_gr+' gr']);
  if(p.pais_origen)dims.push(['País',p.pais_origen]);

  const mView=getMarcajesVista(p.marcaje);
  const mH=inclM&&mView.length?`<div class="si-sec">T?cnicas de marcaje</div><div class="mchips">${mView.map(m=>`<span class="mchip">${fmtTecnicaMarcaje(m)}</span>`).join('')}</div>`:'';
  const vH=inclV&&p.variantes?.length?`<div class="si-sec" style="margin-top:10px">Variantes (${p.variantes.length})</div><div class="vars">${p.variantes.map(v=>`<div class="vchip">${v.color_hex?`<div class="dot" style="background:${v.color_hex}"></div>`:''}<span>${v.descripcion||v.codigo}</span></div>`).join('')}</div>`:'';

  // Selector de imágenes
  const imgSelHtml=imgs.length?`
    <div class="imgsel">
      <div class="si-sec">Imágenes para el PDF <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--mu)">(haz clic para seleccionar)</span></div>
      <div class="imgsel-grid" data-ref="${esc(p.ref)}">
        ${imgs.slice(0,MAX_MODAL_IMGS).map((url,i)=>{
          const on=(imgSel[p.ref]&&imgSel[p.ref].has(url))||(!imgSel[p.ref]&&i===0);
          const blocked=!on&&imgSel[p.ref]&&imgSel[p.ref].size>=MAX_PDF_IMGS;
          return `<div class="imgthumb${on?' on':''}${blocked?' dis':''}" onclick="togImg('${esc(p.ref)}','${esc(url)}',this)">
            <img src="${url}" loading="lazy" onerror="this.src=''" alt="">
            <div class="imgthumb-ck"></div>
          </div>`;
        }).join('')}
        ${imgs.length>MAX_MODAL_IMGS?`<div class="dot-m" style="padding:6px">+${imgs.length-MAX_MODAL_IMGS} imagenes mas</div>`:''}
      </div>
    </div>`:'';

  return `<div class="si" id="si-${esc(p.ref)}">
    <div class="si-head">
      <div class="si-id">
        <span class="si-ref">${p.ref}</span>
        <span class="si-name">${p.nombre}</span>
      </div>
      <button class="si-rm" onclick="qSel('${esc(p.ref)}')">✕ quitar</button>
    </div>
    <div class="si-body">
      <div class="si-col">
        ${p.descripcion?`<div class="si-desc">${p.descripcion}</div>`:''}
        <div class="si-sec">Datos técnicos</div>
        ${dims.map(([l,v])=>`<div class="dato"><span class="dato-l">${l}</span><span class="dato-v">${v}</span></div>`).join('')}
        ${mH}${vH}
      </div>
      <div class="si-col">${imgSelHtml}</div>
    </div>
  </div>`;
}

function togImg(ref,url,el){
  if(!imgSel[ref])imgSel[ref]=new Set();

    if(imgSel[ref].size<=1)return;
    imgSel[ref].delete(url);el.classList.remove('on');

    imgSel[ref].add(url);el.classList.add('on');

  syncImgThumbs(ref);
}

// ─── PDF ───
async function generarPDF(){
  await asegurarDetalles();
  if(!window.jspdf){
    await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  }
  const btn=document.getElementById('btnPDF');
  btn.disabled=true;btn.textContent='Generando…';

  const {jsPDF}=window.jspdf;
  const inclM=document.querySelector('#oM input').checked;
  const inclV=document.querySelector('#oV input').checked;
  const prods=[...sel].map(r=>(DETALLE&&DETALLE[r])||PROD_BY_REF.get(r)).filter(Boolean);

  const W=210,H=297,mar=14,col2=W/2+2;

  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});

  for(let idx=0;idx<prods.length;idx++){
    if(idx>0)doc.addPage();
    const p=prods[idx];
    const selImgs=imgSel[p.ref]?[...imgSel[p.ref]]:(p.imagenes?.slice(0,1)||[]);

    // ── Franja superior muy fina de color ──
    doc.setFillColor(24,22,15);
    doc.rect(0,0,W,8,'F');

    // Nombre producto — grande, protagonista
    doc.setFont('helvetica','bold');
    doc.setFontSize(22);
    doc.setTextColor(24,22,15);
    const nameLines=doc.splitTextToSize(p.nombre,W-mar*2);
    doc.text(nameLines,mar,18);
    let y=18+nameLines.length*9;

    // Ref y familia en gris pequeño
    doc.setFont('helvetica','normal');
    doc.setFontSize(8);
    doc.setTextColor(160,155,148);
    let metaLine=`Ref. ${p.ref}`;
    if(p.familia_principal)metaLine+=`  ·  ${p.familia_principal}`;
    doc.text(metaLine,mar,y);
    y+=5;

    // Línea separadora
    doc.setDrawColor(220,215,208);doc.setLineWidth(.4);doc.line(mar,y,W-mar,y);
    y+=6;

    // ── IMÁGENES seleccionadas ──
    if(selImgs.length){
      const nImgs=Math.min(selImgs.length,6);
      const imgH=nImgs===1?72:nImgs<=2?66:54;
      const availW=W-mar*2;
      const perRow=nImgs===1?1:nImgs===2?2:3;
      const imgW=(availW-(perRow-1)*3)/perRow;
      const nRows=Math.ceil(nImgs/perRow);
      // Precargar todas a la vez
      const b64s=await Promise.all(selImgs.slice(0,nImgs).map(u=>i2b(u,imgW,imgH)));
      let ix=mar,iy=y,col=0;
      for(let i=0;i<nImgs;i++){
        if(b64s[i])doc.addImage(b64s[i],'JPEG',ix,iy,imgW,imgH,undefined,'FAST');
        col++;
        if(col>=perRow){col=0;ix=mar;iy+=imgH+3;}
        else ix+=imgW+3;
      }
      // Avanzar y exactamente lo que ocuparon las filas
      y+=nRows*(imgH+3)-3+6;
    }

    // ── BLOQUE DE DATOS EN 2 COLUMNAS ──
    doc.setDrawColor(220,215,208);doc.line(mar,y,W-mar,y);
    y+=6;

    // Columna izq: descripción + datos técnicos
    let yL=y;
    if(p.descripcion){
      doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(80,76,70);
      const dl=doc.splitTextToSize(p.descripcion,84);
      doc.text(dl,mar,yL);yL+=dl.length*4.8+5;
    }

    const datos=[];
    if(p.dimensiones){const d=p.dimensiones;const pts=[d.ancho,d.largo,d.alto].filter(Boolean);if(pts.length)datos.push(['Medidas',pts.join(' × ')+' cm']);if(d.diametro)datos.push(['Diámetro',d.diametro+' cm']);}
    if(p.material)datos.push(['Material',p.material]);
    if(p.gramaje)datos.push(['Gramaje',p.gramaje]);
    if(p.peso_gr)datos.push(['Peso',p.peso_gr+' gr']);
    if(p.pais_origen)datos.push(['País origen',p.pais_origen]);

    if(datos.length){
      doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(160,155,148);
      doc.text('DATOS TÉCNICOS',mar,yL);yL+=5;
      datos.forEach(([l,v])=>{
        doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(130,125,118);doc.text(l,mar,yL);
        doc.setFont('helvetica','bold');doc.setTextColor(24,22,15);
        const vLines=doc.splitTextToSize(String(v),58);
        doc.text(vLines,mar+28,yL,{lineHeightFactor:1.15});
        yL+=Math.max(5.2,vLines.length*3.8+1.4);
      });
    }

    // Columna der: variantes + marcaje
    let yR=y;
    if(inclV&&p.variantes?.length){
      doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(160,155,148);
      doc.text('VARIANTES DE COLOR',col2,yR);yR+=5;
      let vx=col2,rowH=6;
      p.variantes.forEach(v=>{
        if(vx+22>W-mar){vx=col2;yR+=rowH;}
        if(v.color_hex){const rgb=h2r(v.color_hex);if(rgb){doc.setFillColor(rgb.r,rgb.g,rgb.b);doc.circle(vx+2.2,yR+.8,2.2,'F');doc.setDrawColor(200,195,188);doc.setLineWidth(.18);doc.circle(vx+2.2,yR+.8,2.2,'S');}}
        doc.setFont('helvetica','normal');doc.setFontSize(5.8);doc.setTextColor(60,56,50);
        doc.text(v.descripcion||v.codigo,vx+5.5,yR+2,{maxWidth:15});vx+=22;
      });
      yR+=rowH+3;
    }

    const mView=getMarcajesVista(p.marcaje);
    if(inclM&&mView.length){
      doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(160,155,148);
      doc.text('TÉCNICAS DE MARCAJE',col2,yR);yR+=5;
      const tw=W-col2-mar;
      let chipX=col2,chipTop=yR;
      let rowChipH=0;
      mView.forEach(m=>{
        const label=fmtTecnicaMarcaje(m);
        doc.setFont('helvetica','bold');doc.setFontSize(7.4);
        const maxChipW=Math.min(62,tw);
        const naturalW=doc.getTextWidth(label)+10;
        const chipW=Math.min(maxChipW,Math.max(30,naturalW));
        const lines=doc.splitTextToSize(label,chipW-9);
        const lineH=4.1;
        const chipH=Math.max(8,lines.length*lineH+4.2);
        if(chipX+chipW>W-mar){chipX=col2;chipTop+=rowChipH+2.8;rowChipH=0;}
        doc.setFillColor(244,242,238);
        doc.setDrawColor(220,215,208);
        doc.roundedRect(chipX,chipTop,chipW,chipH,3.2,3.2,'FD');
        doc.setTextColor(80,76,70);
        const textBlockH=lines.length*lineH;
        const textY=chipTop+((chipH-textBlockH)/2)+3;
        doc.text(lines,chipX+4.5,textY,{lineHeightFactor:1.15});
        rowChipH=Math.max(rowChipH,chipH);
        chipX+=chipW+2.5;
      });
      yR=chipTop+rowChipH+3;
    }

    // ── FOOTER ──
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(170,165,158);
    doc.text(new Date().toLocaleDateString('es-ES'),W/2,H-4,{align:'center'});
    doc.text(`${idx+1} / ${prods.length}`,W-mar,H-4,{align:'right'});
  }

  const blob=doc.output('blob');
  const url=URL.createObjectURL(blob);
  const w=window.open(url,'_blank');
  if(!w){
    doc.save(`goya-fichas-${new Date().toISOString().slice(0,10)}.pdf`);
    toast('El navegador bloqueo la vista previa; se descarga el PDF');
  }else{
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  }
  btn.disabled=false;
  btn.innerHTML='<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3"/><path d="M20 17v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/></svg> Previsualizar PDF';
}

function i2b(url,targetW,targetH){
  // Carga la imagen y la recorta centrada al ratio targetW:targetH para evitar distorsión
  return new Promise(res=>{
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{
      try{
        const ratio=targetW&&targetH?targetW/targetH:img.naturalWidth/img.naturalHeight;
        const frameW=900;
        const frameH=Math.round(frameW/ratio);
        const c=document.createElement('canvas');
        c.width=frameW;c.height=frameH;
        const ctx=c.getContext('2d');
        ctx.fillStyle='#fff';
        ctx.fillRect(0,0,frameW,frameH);
        const scale=Math.min(frameW/img.naturalWidth,frameH/img.naturalHeight);
        const dw=Math.round(img.naturalWidth*scale);
        const dh=Math.round(img.naturalHeight*scale);
        const dx=Math.round((frameW-dw)/2);
        const dy=Math.round((frameH-dh)/2);
        ctx.drawImage(img,dx,dy,dw,dh);
        res(c.toDataURL('image/jpeg',.88));
        return;
        /*
        const srcRatio=img.naturalWidth/img.naturalHeight;
        let sx=0,sy=0,sw=img.naturalWidth,sh=img.naturalHeight;
        if(srcRatio>ratio){
          // imagen más ancha → recortar lados
          sw=Math.round(img.naturalHeight*ratio);
          sx=Math.round((img.naturalWidth-sw)/2);
        } else {
          // imagen más alta → recortar arriba/abajo
          sh=Math.round(img.naturalWidth/ratio);
          sy=Math.round((img.naturalHeight-sh)/2);
        }
        const c=document.createElement('canvas');
        c.width=sw;c.height=sh;
        c.getContext('2d').drawImage(img,sx,sy,sw,sh,0,0,sw,sh);
        res(c.toDataURL('image/jpeg',.88));
        */
      }catch{res(null);}
    };
    img.onerror=()=>res(null);img.src=url;
    setTimeout(()=>res(null),7000);
  });
}
function h2r(hex){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);return r?{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)}:null;}

init();
